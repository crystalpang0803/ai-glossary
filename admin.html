<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Glossary - 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root{--color-accent:#6366F1;--color-accent-hover:#4F46E5;--color-surface:#FFF;--color-bg:#F8FAFC;--color-text:#0F172A;--color-text-secondary:#475569;--color-text-muted:#94A3B8;--color-border:#E2E8F0;--color-success:#10B981;--color-danger:#EF4444;--color-hot:#F97316;--radius-md:10px;--radius-lg:14px;--radius-full:9999px;--font-sans:'Inter','Noto Sans SC',sans-serif;--font-mono:'JetBrains Mono',monospace;--sidebar-width:240px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);line-height:1.6}
    .admin-layout{display:flex;min-height:100vh}
    .sidebar{width:var(--sidebar-width);background:var(--color-surface);border-right:1px solid var(--color-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
    .sidebar-header{padding:24px 20px 20px;border-bottom:1px solid var(--color-border)}
    .sidebar-header h1{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .sidebar-header h1 span{color:var(--color-accent)}
    .sidebar-header .back-link{display:block;font-size:0.78rem;color:var(--color-text-muted);text-decoration:none;margin-top:8px}
    .sidebar-header .back-link:hover{color:var(--color-accent)}
    .sidebar-nav{flex:1;padding:16px 12px}
    .sidebar-nav .nav-label{font-size:0.7rem;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.5px;padding:0 8px;margin-bottom:8px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);font-size:0.88rem;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s ease;border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans)}
    .nav-item:hover{background:rgba(99,102,241,0.05);color:var(--color-text)}
    .nav-item.active{background:rgba(99,102,241,0.1);color:var(--color-accent);font-weight:600}
    .nav-item .nav-icon{font-size:1.1rem;width:22px;text-align:center}
    .nav-item .nav-badge{margin-left:auto;background:var(--color-accent);color:#fff;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:var(--radius-full);min-width:20px;text-align:center}
    .sidebar-footer{padding:16px 12px;border-top:1px solid var(--color-border)}
    .sidebar-footer .nav-item{font-size:0.82rem;color:var(--color-text-muted)}
    .main-content{flex:1;margin-left:var(--sidebar-width);padding:32px 40px}
    .main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .main-header h2{font-size:1.3rem;font-weight:800}
    .main-header .header-actions{display:flex;gap:10px}
    .btn{padding:8px 16px;border:none;border-radius:var(--radius-md);font-size:0.85rem;font-weight:600;font-family:var(--font-sans);cursor:pointer;transition:all 0.15s ease;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--color-accent);color:#fff}.btn-primary:hover{background:var(--color-accent-hover)}
    .btn-outline{background:var(--color-surface);color:var(--color-text-secondary);border:1px solid var(--color-border)}.btn-outline:hover{border-color:var(--color-accent);color:var(--color-accent)}
    .btn-success{background:var(--color-success);color:#fff}.btn-success:hover{background:#059669}
    .btn-danger{background:var(--color-danger);color:#fff}.btn-danger:hover{background:#DC2626}
    .btn-hot{background:var(--color-hot);color:#fff}.btn-hot:hover{background:#EA580C}
    .btn-sm{padding:5px 10px;font-size:0.78rem}
    .stats-bar{display:flex;gap:16px;margin-bottom:24px}
    .stat-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px 20px;flex:1}
    .stat-card .stat-num{font-size:1.6rem;font-weight:800;color:var(--color-accent)}
    .stat-card .stat-label{font-size:0.78rem;color:var(--color-text-muted);margin-top:2px}
    .sub-tabs{display:flex;gap:4px;margin-bottom:20px}
    .sub-tab{padding:7px 14px;font-size:0.82rem;font-weight:500;border:none;background:transparent;color:var(--color-text-muted);cursor:pointer;border-radius:var(--radius-md);font-family:var(--font-sans);transition:all 0.15s ease}
    .sub-tab:hover{color:var(--color-text);background:rgba(0,0,0,0.03)}
    .sub-tab.active{background:var(--color-accent);color:#fff}
    .term-list{display:flex;flex-direction:column;gap:12px}
    .term-item{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:20px 24px;transition:all 0.15s ease}
    .term-item:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .term-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:8px}
    .term-item-title{font-size:1rem;font-weight:700}
    .term-item-meta{font-size:0.82rem;color:var(--color-text-secondary);margin-bottom:6px}
    .term-item-desc{font-size:0.88rem;color:var(--color-text-muted);line-height:1.7}
    .term-item-actions{display:flex;gap:6px;flex-shrink:0}
    .term-item-time{font-size:0.72rem;color:var(--color-text-muted);margin-top:8px}
    .hot-badge{background:var(--color-hot);color:#fff;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);margin-left:8px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--color-text-muted)}
    .empty-state h3{font-size:1rem;margin-bottom:6px;color:var(--color-text-secondary)}
    .empty-state p{font-size:0.88rem}
    .search-box{width:100%;padding:10px 14px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:0.88rem;font-family:var(--font-sans);outline:none;margin-bottom:16px;transition:border-color 0.15s ease}
    .search-box:focus{border-color:var(--color-accent)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1000;align-items:center;justify-content:center;padding:24px}
    .modal-overlay.show{display:flex}
    .modal-content{background:var(--color-surface);border-radius:var(--radius-lg);max-width:700px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--color-border);display:flex;justify-content:space-between;align-items:center}
    .modal-header h3{font-size:1rem;font-weight:700}
    .modal-body{padding:20px 24px;overflow-y:auto;flex:1}
    .detail-modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1000;align-items:center;justify-content:center;padding:24px}
    .detail-modal.show{display:flex}
    .detail-content{background:var(--color-surface);border-radius:var(--radius-lg);max-width:680px;width:100%;max-height:85vh;overflow-y:auto;padding:28px;position:relative}
    .detail-close{position:absolute;top:16px;right:16px}
    .detail-title{font-size:1.3rem;font-weight:800;margin-bottom:4px}
    .detail-subtitle{font-size:0.88rem;color:var(--color-text-muted);margin-bottom:20px}
    .detail-section{margin-bottom:16px}
    .detail-section label{display:block;font-size:0.75rem;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
    .detail-section input,.detail-section textarea,.detail-section select{width:100%;padding:9px 12px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:0.88rem;font-family:var(--font-sans);outline:none;transition:border-color 0.15s ease;background:var(--color-surface);color:var(--color-text)}
    .detail-section input:focus,.detail-section textarea:focus{border-color:var(--color-accent)}
    .detail-section textarea{resize:vertical;min-height:60px}
    .detail-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .detail-actions{margin-top:20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--color-border);padding-top:16px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--color-text);color:#fff;padding:10px 20px;border-radius:var(--radius-full);font-size:0.85rem;font-weight:500;z-index:2000;animation:fadeUp 0.3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .loading-state{text-align:center;padding:40px;color:var(--color-text-muted);font-size:0.88rem}
    .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1100;align-items:center;justify-content:center;padding:24px}
    .confirm-overlay.show{display:flex}
    .confirm-box{background:var(--color-surface);border-radius:var(--radius-lg);max-width:400px;width:100%;padding:28px;text-align:center}
    .confirm-box .confirm-icon{font-size:2.2rem;margin-bottom:12px}
    .confirm-box .confirm-title{font-size:1rem;font-weight:700;margin-bottom:6px}
    .confirm-box .confirm-msg{font-size:0.88rem;color:var(--color-text-secondary);margin-bottom:20px;line-height:1.5}
    .confirm-box .confirm-actions{display:flex;gap:10px;justify-content:center}
    .confirm-box .confirm-actions .btn{padding:10px 24px;font-size:0.88rem}
    .auth-overlay{position:fixed;inset:0;background:var(--color-bg);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-overlay.hidden{display:none}
    .auth-box{background:var(--color-surface);border-radius:var(--radius-lg);max-width:380px;width:100%;padding:36px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .auth-box .auth-icon{font-size:2.6rem;margin-bottom:16px}
    .auth-box .auth-title{font-size:1.2rem;font-weight:800;margin-bottom:6px}
    .auth-box .auth-sub{font-size:0.88rem;color:var(--color-text-muted);margin-bottom:24px}
    .auth-box input[type=password]{width:100%;padding:12px 14px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:0.88rem;font-family:var(--font-sans);outline:none;margin-bottom:8px;transition:border-color 0.15s ease}
    .auth-box input[type=password]:focus{border-color:var(--color-accent)}
    .auth-box .auth-error{font-size:0.82rem;color:var(--color-danger);margin-bottom:16px;display:none}
    .auth-box .auth-error.show{display:block}
    .auth-box .auth-btn{width:100%;padding:12px;font-size:0.88rem;font-weight:700}
    mark.hl{background:rgba(99,102,241,0.22);color:var(--color-accent);padding:0 1px;border-radius:3px;font-weight:700}
    .submitted-badge{background:#0EA5E9;color:#fff;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);margin-left:8px}
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1><span>◆</span> 管理后台</h1>
        <a href="index.html" class="back-link">← 返回术语库</a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-label">管理</div>
        <button class="nav-item active" data-section="glossary">
          <span class="nav-icon">📚</span> 词库管理
        </button>
        <button class="nav-item" data-section="hot">
          <span class="nav-icon">🔥</span> 热点词汇
          <span class="nav-badge" id="hotBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" data-section="submitted">
          <span class="nav-icon">📥</span> 新增词汇
          <span class="nav-badge" id="submittedBadge" style="display:none;">0</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" id="exportBtn">
          <span class="nav-icon">💾</span> 备份导出
        </button>
      </div>
    </aside>
    <div class="main-content">
      <!-- 词库管理 -->
      <div id="sectionGlossary">
        <div class="main-header">
          <h2>词库管理</h2>
          <div class="header-actions">
            <button class="btn btn-outline" id="importBtn">📥 导入Excel</button>
            <button class="btn btn-primary" id="addNewBtn">+ 添加术语</button>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">术语总数</div></div>
          <div class="stat-card"><div class="stat-num" id="statHot">-</div><div class="stat-label">热点词汇</div></div>
        </div>
        <input type="text" class="search-box" id="glossarySearchInput" placeholder="搜索术语（英文、中文、缩写）...">
        <div class="term-list" id="glossaryList"><div class="loading-state">正在加载...</div></div>
      </div>
      <!-- 热点词汇 -->
      <div id="sectionHot" style="display:none;">
        <div class="main-header">
          <h2>热点词汇管理</h2>
          <div class="header-actions">
            <button class="btn btn-hot" id="autoPromoteBtn">⚡ 自动沉淀</button>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-card"><div class="stat-num" id="statHotTotal">-</div><div class="stat-label">热点词汇总数</div></div>
          <div class="stat-card"><div class="stat-num" id="statHotReady">-</div><div class="stat-label">可沉淀</div></div>
        </div>
        <div class="sub-tabs">
          <button class="sub-tab active" data-subtab="all">全部</button>
          <button class="sub-tab" data-subtab="ready">可沉淀</button>
        </div>
        <input type="text" class="search-box" id="hotSearchInput" placeholder="搜索热点词汇...">
        <div class="term-list" id="hotList"><div class="loading-state">正在加载...</div></div>
      </div>
      <!-- 新增词汇（用户提交，待审核） -->
      <div id="sectionSubmitted" style="display:none;">
        <div class="main-header">
          <h2>新增词汇 · 用户提交</h2>
        </div>
        <div class="stats-bar">
          <div class="stat-card"><div class="stat-num" id="statSubmitted">-</div><div class="stat-label">待审核新增词汇</div></div>
        </div>
        <input type="text" class="search-box" id="submittedSearchInput" placeholder="搜索新增词汇（英文、中文、缩写）...">
        <div class="term-list" id="submittedList"><div class="loading-state">正在加载...</div></div>
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal-content" style="max-width:420px;">
      <div class="modal-header"><h3>备份导出</h3><button class="btn btn-sm btn-outline" id="exportClose">关闭</button></div>
      <div class="modal-body" style="text-align:center;padding:32px 24px;">
        <p style="font-size:0.88rem;color:var(--color-text-secondary);margin-bottom:24px;">选择导出格式</p>
        <div style="display:flex;gap:16px;justify-content:center;">
          <button class="btn btn-primary" onclick="exportAsExcel()" style="padding:14px 28px;">📊 导出 Excel</button>
          <button class="btn btn-outline" onclick="exportAsPDF()" style="padding:14px 28px;">📄 导出 PDF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail/Edit Modal -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-content">
      <button class="btn btn-sm btn-outline detail-close" id="detailClose">关闭</button>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-subtitle" id="detailSubtitle"></div>
      <div class="detail-row">
        <div class="detail-section"><label>英文术语</label><input type="text" id="detailTermEn"></div>
        <div class="detail-section"><label>中文翻译</label><input type="text" id="detailTermZh"></div>
      </div>
      <div class="detail-row">
        <div class="detail-section"><label>缩写</label><input type="text" id="detailAbbr"></div>
        <div class="detail-section"><label>分类</label><select id="detailCategory"><option value="AI概念">AI概念</option><option value="AI技术">AI技术</option><option value="AI应用">AI应用</option><option value="AI安全">AI安全</option><option value="数据与训练">数据与训练</option><option value="AI工程">AI工程</option></select></div>
      </div>
      <div class="detail-section"><label>一句话描述</label><input type="text" id="detailOneliner"></div>
      <div class="detail-section"><label>详细定义</label><textarea id="detailDefinition" rows="3"></textarea></div>
      <div class="detail-section"><label>通俗解读</label><textarea id="detailExplanation" rows="3"></textarea></div>
      <div class="detail-row">
        <div class="detail-section"><label>来源</label><input type="text" id="detailSource"></div>
        <div class="detail-section"><label>来源链接</label><input type="text" id="detailSourceUrl"></div>
      </div>
      <div class="detail-section"><label>关联术语（逗号分隔）</label><input type="text" id="detailRelated"></div>
      <div class="detail-actions">
        <button class="btn btn-outline" id="detailCancelBtn">取消</button>
        <button class="btn btn-primary" id="detailSaveBtn">保存修改</button>
      </div>
    </div>
  </div>

  <!-- Add Term Modal -->
  <div class="detail-modal" id="addModal">
    <div class="detail-content">
      <button class="btn btn-sm btn-outline detail-close" id="addModalClose">关闭</button>
      <div class="detail-title">添加术语</div>
      <div class="detail-subtitle">填写以下信息，直接添加到正式词库</div>
      <div class="detail-row">
        <div class="detail-section"><label>英文术语 *</label><input type="text" id="addTermEn" placeholder="如: Retrieval-Augmented Generation"></div>
        <div class="detail-section"><label>中文翻译 *</label><input type="text" id="addTermZh" placeholder="如: 检索增强生成"></div>
      </div>
      <div class="detail-row">
        <div class="detail-section"><label>缩写</label><input type="text" id="addTermAbbr" placeholder="如: RAG"></div>
        <div class="detail-section"><label>分类 *</label><select id="addTermCategory"><option value="AI概念">AI概念</option><option value="AI技术">AI技术</option><option value="AI应用">AI应用</option><option value="AI安全">AI安全</option><option value="数据与训练">数据与训练</option><option value="AI工程">AI工程</option></select></div>
      </div>
      <div class="detail-section"><label>一句话描述 *</label><input type="text" id="addTermOneliner" placeholder="用一句话解释"></div>
      <div class="detail-section"><label>详细定义 *</label><textarea id="addTermDef" rows="3" placeholder="完整的术语定义..."></textarea></div>
      <div class="detail-section"><label>通俗解读 *</label><textarea id="addTermExplanation" rows="3" placeholder="日常例子来解释..."></textarea></div>
      <div class="detail-row">
        <div class="detail-section"><label>来源名称</label><input type="text" id="addTermSourceName" placeholder="如: Stanford HAI"></div>
        <div class="detail-section"><label>来源链接</label><input type="text" id="addTermSourceUrl" placeholder="https://..."></div>
      </div>
      <div class="detail-section"><label>关联术语ID（逗号分隔）</label><input type="text" id="addTermRelated" placeholder="如: machine-learning"></div>
      <div class="detail-actions">
        <button class="btn btn-outline" id="addCancelBtn">取消</button>
        <button class="btn btn-primary" id="addConfirmBtn">添加到术语库</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-icon" id="confirmIcon">⚠️</div>
      <div class="confirm-title" id="confirmTitle">确认操作</div>
      <div class="confirm-msg" id="confirmMsg">确定要执行此操作吗？</div>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="confirmCancel">取消</button>
        <button class="btn btn-danger" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
      <div class="auth-icon">🔐</div>
      <div class="auth-title">管理后台</div>
      <div class="auth-sub">请输入管理员密码以继续</div>
      <input type="password" id="authPassword" placeholder="输入密码" autocomplete="current-password">
      <div class="auth-error" id="authError">密码错误，请重试</div>
      <button class="btn btn-primary auth-btn" id="authSubmit">进入后台</button>
    </div>
  </div>

  <input type="file" id="importFileInput" accept=".xlsx,.xls" style="display:none;">

  <script>
    // ===== Auth (Password Protection) =====
    const ADMIN_PASSWORD = 'aiglossary2026';
    const authOverlay = document.getElementById('authOverlay');
    const authPassword = document.getElementById('authPassword');
    const authError = document.getElementById('authError');
    const authSubmit = document.getElementById('authSubmit');
    const adminLayout = document.querySelector('.admin-layout');
    adminLayout.style.display = 'none';

    function checkAuth() {
      const pwd = authPassword.value;

    // ===== Confirm Modal =====
    let confirmResolve = null;
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmIcon = document.getElementById('confirmIcon');
    const confirmTitle = document.getElementById('confirmTitle');
    const confirmMsg = document.getElementById('confirmMsg');
    const confirmOk = document.getElementById('confirmOk');
    const confirmCancel = document.getElementById('confirmCancel');

    function showConfirm(msg, opts = {}) {
      confirmIcon.textContent = opts.icon || '⚠️';
      confirmTitle.textContent = opts.title || '确认操作';
      confirmMsg.textContent = msg;

    confirmCancel.addEventListener('click', () => { confirmOverlay.classList.remove('show'); if (confirmResolve) confirmResolve(false); confirmResolve = null; });

    // ===== API Helpers =====
    const API = '/api';
    async function apiGet(path) {
      try { const r = await fetch(API + path); if (!r.ok) throw new Error(r.statusText); return await r.json(); }
      catch (e) { console.error('GET', path, e); return null; }
    }
    async function apiPost(path, body) {
      try { const r = await fetch(API + path, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }); if (!r.ok) throw new Error(r.statusText); return await r.json(); }
      catch (e) { console.error('POST', path, e); showToast('操作失败: ' + e.message); return null; }
    }
    async function apiPut(path, body) {
      try { const r = await fetch(API + path, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }); if (!r.ok) throw new Error(r.statusText); return await r.json(); }
      catch (e) { console.error('PUT', path, e); showToast('操作失败: ' + e.message); return null; }
    }
    async function apiDelete(path) {
      try { const r = await fetch(API + path, { method: 'DELETE' }); if (!r.ok) throw new Error(r.statusText); return true; }
      catch (e) { console.error('DELETE', path, e); showToast('操作失败: ' + e.message); return false; }
    }

    // ===== Data =====
    let glossaryTerms = [];
    let hotTerms = [];
    let currentSection = 'glossary';
    let currentSubTab = 'all';
    let glossarySearchQuery = '';
    let hotSearchQuery = '';
    let editingTermId = null;
    let editingMode = 'glossary';
    let submittedTerms = [];
    let submittedSearchQuery = '';

    // ===== Init =====
    async function loadData() {
      const [terms, hot, submitted] = await Promise.all([
        apiGet('/terms?status=official'),

        apiGet('/submitted-terms')
      ]);
      glossaryTerms = terms || [];

      renderGlossaryList();
      renderHotList();
      renderSubmittedList();

    loadData();

    // ===== Stats =====
    function updateStats() {
      document.getElementById('statTotal').textContent = glossaryTerms.length;
      document.getElementById('statHot').textContent = hotTerms.length;
      document.getElementById('statHotTotal').textContent = hotTerms.length;
      const readyCount = hotTerms.length; // 所有热点词汇都可沉淀
      document.getElementById('statHotReady').textContent = readyCount;
      const badge = document.getElementById('hotBadge');
      if (hotTerms.length > 0) { badge.style.display = 'inline'; badge.textContent = hotTerms.length; }
      else { badge.style.display = 'none'; }
      const sEl = document.getElementById('statSubmitted'); if (sEl) sEl.textContent = submittedTerms.length;
      const sBadge = document.getElementById('submittedBadge');
      if (sBadge) { if (submittedTerms.length > 0) { sBadge.style.display = 'inline'; sBadge.textContent = submittedTerms.length; } else { sBadge.style.display = 'none'; } }
    }

    // ===== 搜索高亮 =====
    function escapeHtml(str){return String(str==null?'':str).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    function hl(text, q){
      const t = escapeHtml(text);
      if(!q) return t;
      const safe = String(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      try { return t.replace(new RegExp('('+safe+')','gi'), '<mark class="hl">$1</mark>'); } catch(e){ return t; }
    }

    // ===== Render: 新增词汇 =====
    function renderSubmittedList() {
      const list = document.getElementById('submittedList');
      if (!list) return;
      let data = submittedTerms;
      if (submittedSearchQuery) {
        const q = submittedSearchQuery.toLowerCase();
        data = data.filter(t => (t.term_en||'').toLowerCase().includes(q) || (t.term_zh||'').includes(q) || (t.abbreviation||'').toLowerCase().includes(q));
      }
      if (data.length === 0) { list.innerHTML = '<div class="empty-state"><h3>暂无新增词汇</h3><p>用户在前台提交的新术语会出现在这里，待你审核</p></div>'; return; }
      list.innerHTML = '<div style="font-size:0.8rem;color:var(--color-text-muted);margin-bottom:12px;">共 ' + data.length + ' 条待审核</div>' +
        data.map(term =>
          '<div class="term-item"><div class="term-item-header"><div>' +
          '<div class="term-item-title">' + hl(term.term_en, submittedSearchQuery) + (term.term_zh ? ' · ' + hl(term.term_zh, submittedSearchQuery) : '') +
          '<span class="submitted-badge">📥 新增</span></div>' +
          '<div class="term-item-meta">' + (term.abbreviation ? hl(term.abbreviation, submittedSearchQuery) + ' · ' : '') + (term.category||'未分类') + ' · 来源: ' + (term.source||'用户提交') + '</div>' +
          '</div><div class="term-item-actions">' +
          '<button class="btn btn-sm btn-outline" onclick="editSubmittedItem(\'' + term.id + '\')">编辑</button>' +
          '<button class="btn btn-sm btn-success" onclick="promoteSubmittedItem(\'' + term.id + '\')">通过并入库</button>' +
          '<button class="btn btn-sm btn-danger" onclick="deleteSubmittedItem(\'' + term.id + '\')">删除</button>' +
          '</div></div>' +
          '<div class="term-item-desc">' + (term.one_liner || term.definition || term.explanation || '') + '</div>' +
          (term.submitted_at ? '<div class="term-item-time">提交于: ' + new Date(term.submitted_at).toLocaleString('zh-CN') + '</div>' : '') +
          '</div>'
        ).join('');
    }

    async function promoteSubmittedItem(id) {
      const yes = await showConfirm('确定通过审核并加入正式词库吗？', { title: '通过新增词汇', icon: '✅', btnText: '通过', btnClass: 'btn-success' });
      if (!yes) return;
      const result = await apiPost('/submitted-terms/' + id + '/promote');
      if (result) {
        const t = submittedTerms.find(x => x.id === id);
        submittedTerms = submittedTerms.filter(x => x.id !== id);
        if (t) glossaryTerms.push(result.promoted || t);
        updateStats(); renderSubmittedList(); renderGlossaryList();
        showToast('已通过并加入词库');
      }
    }
    async function deleteSubmittedItem(id) {
      const yes = await showConfirm('确定删除这条新增词汇吗？', { title: '删除新增词汇', icon: '🗑️', btnText: '删除' });
      if (!yes) return;
      const ok = await apiDelete('/submitted-terms/' + id);
      if (ok) { submittedTerms = submittedTerms.filter(x => x.id !== id); updateStats(); renderSubmittedList(); showToast('已删除'); }
    }

      document.getElementById('detailDefinition').value = term.definition || '';

      document.getElementById('detailSourceUrl').value = term.source_url || '';
      document.getElementById('detailRelated').value = (term.related || []).join(', ');

    // ===== Render: Glossary List =====
    function renderGlossaryList() {
      const list = document.getElementById('glossaryList');
      let data = glossaryTerms;
      if (glossarySearchQuery) {
        const q = glossarySearchQuery.toLowerCase();
        data = data.filter(t => t.term_en.toLowerCase().includes(q) || t.term_zh.includes(q) || (t.abbreviation && t.abbreviation.toLowerCase().includes(q)));
      }
      if (data.length === 0) { list.innerHTML = '<div class="empty-state"><h3>没有匹配的术语</h3><p>尝试其他搜索词</p></div>'; return; }
      list.innerHTML = '<div style="font-size:0.8rem;color:var(--color-text-muted);margin-bottom:12px;">共 ' + data.length + ' 条术语</div>' +
        data.map(term =>
          '<div class="term-item"><div class="term-item-header"><div>' +
          '<div class="term-item-title">' + hl(term.term_en, glossarySearchQuery) + ' · ' + hl(term.term_zh, glossarySearchQuery) + '</div>' +
          '<div class="term-item-meta">' + (term.abbreviation ? hl(term.abbreviation, glossarySearchQuery) + ' · ' : '') + term.category + ' · 来源: ' + (term.source || '未知') + '</div>' +

          '<button class="btn btn-sm btn-danger" onclick="deleteGlossaryItem(\'' + term.id + '\')">删除</button>' +
          '</div></div><div class="term-item-desc">' + (term.one_liner || '') + '</div></div>'

    // ===== Render: Hot Terms List =====
    function renderHotList() {
      const list = document.getElementById('hotList');
      let data = hotTerms;
      if (currentSubTab === 'ready') data = data.filter(t => t.appear_count >= 1); // 所有人工智能推荐词汇都可沉淀
      if (hotSearchQuery) {
        const q = hotSearchQuery.toLowerCase();
        data = data.filter(t => (t.term_en || '').toLowerCase().includes(q) || (t.term_zh || '').includes(q));
      }
      if (data.length === 0) {
        const label = currentSubTab === 'ready' ? '可沉淀' : '热点';
        list.innerHTML = '<div class="empty-state"><h3>暂无' + label + '词汇</h3><p>用户提交的新术语会出现在这里</p></div>';
        return;
      }
      list.innerHTML = data.map(term => {
        const canPromote = true; // 所有热点词汇都可以沉淀
        return '<div class="term-item"><div class="term-item-header"><div>' +
          '<div class="term-item-title">' + hl(term.term_en || '', hotSearchQuery) + (term.term_zh ? ' · ' + hl(term.term_zh, hotSearchQuery) : '') +
          '<span class="hot-badge">🔥 ' + term.appear_count + '</span></div>' +
          '<div class="term-item-meta">' + (term.category || '未分类') + (term.source ? ' · 来源: ' + term.source : '') + '</div>' +

          (term.first_appeared ? '<div class="term-item-time">首次: ' + new Date(term.first_appeared).toLocaleDateString('zh-CN') + ' · 最近: ' + new Date(term.last_appeared || term.last_seen).toLocaleDateString('zh-CN') + '</div>' : '') +
          '</div>';

    document.getElementById('detailSaveBtn').addEventListener('click', async () => {
      if (!editingTermId) return;
      const updates = {
        term_en: document.getElementById('detailTermEn').value.trim(),
        term_zh: document.getElementById('detailTermZh').value.trim(),
        abbreviation: document.getElementById('detailAbbr').value.trim(),
        category: document.getElementById('detailCategory').value,
        one_liner: document.getElementById('detailOneliner').value.trim(),
        definition: document.getElementById('detailDefinition').value.trim(),
        explanation: document.getElementById('detailExplanation').value.trim(),
        source: document.getElementById('detailSource').value.trim(),
        source_url: document.getElementById('detailSourceUrl').value.trim(),
        related: document.getElementById('detailRelated').value.trim().split(',').map(s => s.trim()).filter(Boolean)
      };
      const endpoint = editingMode === 'submitted' ? '/submitted-terms/' : '/terms/';
      const targetId = editingTermId;
      const mode = editingMode;
      const result = await apiPut(endpoint + targetId, updates);
      if (result) {
        if (mode === 'submitted') {
          const i = submittedTerms.findIndex(t => t.id === targetId);
          if (i >= 0) submittedTerms[i] = { ...submittedTerms[i], ...updates };
          closeDetailModal();
          renderSubmittedList();
        } else {
          const idx = glossaryTerms.findIndex(t => t.id === targetId);
          if (idx >= 0) glossaryTerms[idx] = { ...glossaryTerms[idx], ...updates };
          closeDetailModal();
          renderGlossaryList();
        }
        showToast('已保存修改');
      }
    });

    // ===== Export =====
    function exportAsExcel() {
      const rows = glossaryTerms.map(t => ({
        '英文术语': t.term_en, '中文翻译': t.term_zh, '缩写': t.abbreviation || '',
        '分类': t.category || '', '一句话描述': t.one_liner || '', '详细定义': t.definition || '',
        '通俗解读': t.explanation || '', '来源': t.source || '', '来源链接': t.source_url || '',
        '关联术语': (t.related || []).join(', ')
      }));
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{wch:30},{wch:15},{wch:8},{wch:12},{wch:40},{wch:50},{wch:50},{wch:15},{wch:40},{wch:30}];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'AI术语库');
      XLSX.writeFile(wb, 'AI_Glossary_' + new Date().toISOString().slice(0,10) + '.xlsx');
      showToast('已导出 Excel（' + glossaryTerms.length + ' 条术语）');
      closeExportModal();
    }

    function exportAsPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('l', 'mm', 'a4');
      doc.setFontSize(16); doc.text('AI Glossary', 14, 15);
      doc.setFontSize(9); doc.setTextColor(100);
      doc.text('Exported: ' + new Date().toLocaleDateString('zh-CN') + ' | Total: ' + glossaryTerms.length + ' terms', 14, 22);
      const headers = [['English', 'Chinese', 'Abbr', 'Category', 'Description']];
      const body = glossaryTerms.map(t => [t.term_en||'', t.term_zh||'', t.abbreviation||'', t.category||'', (t.one_liner||'').substring(0,60)]);
      doc.autoTable({ head: headers, body: body, startY: 28, styles: { fontSize: 8, cellPadding: 2 }, headStyles: { fillColor: [99,102,241] }, columnStyles: { 0:{cellWidth:55}, 1:{cellWidth:35}, 2:{cellWidth:20}, 3:{cellWidth:25}, 4:{cellWidth:'auto'} } });
      doc.save('AI_Glossary_' + new Date().toISOString().slice(0,10) + '.pdf');
      showToast('已导出 PDF（' + glossaryTerms.length + ' 条术语）');
      closeExportModal();
    }

    // ===== Import Excel =====
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFileInput').click());
    document.getElementById('importFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (evt) => {
        try {
          const workbook = XLSX.read(evt.target.result, { type: 'array' });
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
          if (rows.length === 0) { showToast('Excel文件为空'); return; }
          let imported = 0;
          for (const row of rows) {
            const termEn = row['英文术语'] || row['term_en'] || row['English'] || '';
            const termZh = row['中文翻译'] || row['term_zh'] || row['Chinese'] || '';
            if (!termEn && !termZh) continue;
            const id = (termEn || termZh).toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-').replace(/(^-|-$)/g, '');
            if (glossaryTerms.find(t => t.id === id)) continue;
            const newTerm = {
              id, term_en: termEn, term_zh: termZh,
              abbreviation: row['缩写'] || row['abbreviation'] || '',
              category: row['分类'] || row['category'] || 'AI概念',
              one_liner: row['一句话描述'] || row['one_liner'] || '',
              definition: row['详细定义'] || row['definition'] || '',
              explanation: row['通俗解读'] || row['explanation'] || '',
              source: row['来源'] || row['source'] || '',
              source_url: row['来源链接'] || row['source_url'] || '',
              related: (row['关联术语'] || row['related'] || '').split(',').map(s => s.trim()).filter(Boolean)
            };
            const result = await apiPost('/terms', newTerm);
            if (result) { glossaryTerms.push(result); imported++; }
          }
          if (imported > 0) { updateStats(); renderGlossaryList(); showToast('成功导入 ' + imported + ' 条术语'); }
          else { showToast('没有新术语可导入（可能全部重复）'); }
        } catch (err) { showToast('解析Excel失败: ' + err.message); }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = '';
    });

    // ===== Section Navigation =====
    document.querySelectorAll('.nav-item[data-section]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item[data-section]').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentSection = item.dataset.section;
        document.getElementById('sectionGlossary').style.display = currentSection === 'glossary' ? 'block' : 'none';
        document.getElementById('sectionHot').style.display = currentSection === 'hot' ? 'block' : 'none';
        document.getElementById('sectionSubmitted').style.display = currentSection === 'submitted' ? 'block' : 'none';
        if (currentSection === 'hot') renderHotList();
        if (currentSection === 'submitted') renderSubmittedList();
      });
    });

    // ===== Sub tabs =====
    document.querySelectorAll('.sub-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSubTab = tab.dataset.subtab;
        renderHotList();
      });
    });

    // ===== Search =====
    document.getElementById('glossarySearchInput').addEventListener('input', e => { glossarySearchQuery = e.target.value.trim(); renderGlossaryList(); });
    document.getElementById('hotSearchInput').addEventListener('input', e => { hotSearchQuery = e.target.value.trim(); renderHotList(); });
    document.getElementById('submittedSearchInput').addEventListener('input', e => { submittedSearchQuery = e.target.value.trim(); renderSubmittedList(); });

    // ===== Toast =====
    function showToast(msg) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>
</body>
</html>
