<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Glossary - 人工智能术语库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="brand-icon">&#9670;</span>
        <span class="brand-text">AI Glossary</span>
      </div>
      <div class="nav-actions">
        <button class="nav-submit-btn" id="navSubmitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>
          添加词语
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero区域 -->
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-badge">人工智能术语库</div>
      <h1 class="hero-title">快速掌握 AI 核心概念</h1>
      <p class="hero-desc">从基础原理到前沿技术，精选术语库帮助你建立完整的AI知识体系</p>
      <div class="search-wrapper">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索术语、缩写或中文名称" autocomplete="off">
          <kbd class="search-kbd">Enter ↵</kbd>
        </div>
        <div id="searchSuggestions" class="search-suggestions hidden"></div>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- 热门术语排行榜 -->
    <section class="hot-terms-section" id="hotTermsSection">
      <div class="hot-terms-header">
        <div class="hot-terms-title">
          <span class="hot-icon">🔥</span>
          <h2>热门术语排行榜</h2>
          <span class="hot-count" id="hotCount">0</span>
        </div>
        <p class="hot-terms-desc">每日自动从全球AI信息源抓取，按出现频次排行 <span id="hotDate" style="margin-left:8px;color:var(--color-accent);font-weight:500;"></span></p>
      </div>
      <div class="hot-terms-grid" id="hotTermsGrid">
        <!-- 动态渲染 -->
      </div>
    </section>

    <!-- 排行榜与词库分隔 -->
    <div class="section-divider">
      <div class="divider-line"></div>
      <span class="divider-text">词 库</span>
      <div class="divider-line"></div>
    </div>

    <!-- 工具栏 -->
    <section class="toolbar">
      <div class="toolbar-inner">
        <div class="filter-group">
          <button class="filter-chip active" data-category="all">全部</button>
          <button class="filter-chip" data-category="AI概念">概念</button>
          <button class="filter-chip" data-category="AI技术">技术</button>
          <button class="filter-chip" data-category="AI应用">应用</button>
          <button class="filter-chip" data-category="AI安全">安全</button>
          <button class="filter-chip" data-category="数据与训练">数据</button>
          <button class="filter-chip" data-category="AI工程">工程</button>
        </div>
        <div class="toolbar-meta">
          <span id="filterInfo" class="filter-info">显示全部</span>
        </div>
      </div>
    </section>
    <nav class="alpha-rail" id="alphaNav"></nav>
    <section class="grid-container">
      <div class="glossary-grid" id="glossaryGrid"></div>
    </section>
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-visual">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6"/>
        </svg>
      </div>
      <h3>未找到匹配的术语</h3>
      <p>尝试其他关键词，或<button class="link-btn" id="submitTermBtn">提交新术语</button></p>
    </div>
  </main>

  <!-- 词条详情弹窗 -->
  <div class="modal-overlay hidden" id="termModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-header">
        <span class="modal-category" id="modalCategory"></span>
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-subtitle" id="modalSubtitle"></p>
        <div class="modal-oneliner" id="modalOneliner"></div>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <div class="section-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            权威定义
          </div>
          <p id="modalDefinition"></p>
          <div id="modalSourceLinks"></div>
        </div>
        <div class="modal-section highlight-section">
          <div class="section-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            通俗解读
          </div>
          <p id="modalExplanation"></p>
        </div>
        <div class="modal-section">
          <div class="section-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            相关术语
          </div>
          <div class="related-terms" id="modalRelated"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 提交新术语弹窗 -->
  <div class="modal-overlay hidden" id="submitModal">
    <div class="modal-content submit-modal">
      <button class="modal-close" id="submitModalClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="submit-header">
        <h2>提交新术语</h2>
        <p>发现了遗漏的AI术语？提交后将出现在热点词汇区。</p>
      </div>
      <form id="submitForm">
        <div class="form-row">
          <div class="form-group">
            <label for="newTermEn">英文术语 *</label>
            <input type="text" id="newTermEn" required placeholder="如: Retrieval-Augmented Generation">
          </div>
          <div class="form-group">
            <label for="newTermZh">中文翻译 *</label>
            <input type="text" id="newTermZh" required placeholder="如: 检索增强生成">
          </div>
        </div>
        <div class="form-group">
          <label for="newTermAbbr">缩写（选填）</label>
          <input type="text" id="newTermAbbr" placeholder="如: RAG">
        </div>
        <div class="form-group">
          <label for="newTermDesc">简要描述 *</label>
          <textarea id="newTermDesc" required placeholder="一句话描述该术语的含义..." rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="newTermSource">来源链接（选填）</label>
          <input type="text" id="newTermSource" placeholder="https://...">
        </div>
        <button type="submit" class="submit-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          提交到热点词汇
        </button>
      </form>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-sources">
        <span class="footer-label">数据来源</span>
        <div class="source-tags">
          <span class="source-tag">Stanford HAI</span>
          <span class="source-tag">Coursera</span>
          <span class="source-tag">CNET</span>
          <span class="source-tag">Boston University</span>
          <span class="source-tag">Hugging Face</span>
        </div>
      </div>
      <div class="footer-meta">
        <span>&copy; 2026 AI Glossary</span>
        <a href="admin.html" class="admin-link">管理后台</a>
      </div>
    </div>
  </footer>

  <!-- Scroll to bottom button -->
  <button id="scrollBottomBtn" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})" title="去底部" style="position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--color-accent);color:#fff;border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(99,102,241,0.3);transition:opacity 0.2s,transform 0.2s;z-index:50;">&#8595;</button>

  <script src="app.js"></script>
</body>
</html>
