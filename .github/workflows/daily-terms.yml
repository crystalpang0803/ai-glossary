name: Daily Hot Terms Fetch

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch-terms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser jsdom

      - name: Fetch hot terms
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: node crawler/fetch-terms.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hot-terms.json
          git diff --cached --quiet || git commit -m "chore: update hot terms $(date +%Y-%m-%d)"
          git push