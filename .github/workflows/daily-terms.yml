name: Daily Hot Terms Fetch

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许 bot push 代码

jobs:
  fetch-terms:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # rebase 需要完整历史

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install rss-parser jsdom @neondatabase/serverless

      - name: Fetch hot terms
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: node crawler/fetch-terms.js

      - name: Sync hot terms to database
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            node -e "
            const { neon } = require('@neondatabase/serverless');
            const fs = require('fs');
            const path = require('path');
            (async () => {
              const sql = neon(process.env.DATABASE_URL);
              // 清空旧热点数据
              await sql\`DELETE FROM hot_terms\`;
              // 读取新的热点数据
              const hotData = JSON.parse(fs.readFileSync('data/hot-terms.json', 'utf8'));
              console.log('Importing ' + hotData.length + ' hot terms...');
              for (const term of hotData) {
                await sql\`INSERT INTO hot_terms (id, term_en, term_zh, abbreviation, category, one_liner, definition, explanation, source, source_url, appear_count, first_appeared, last_appeared, status, related, date, sources, source_urls, matched_articles)
                  VALUES (\${term.id}, \${term.term_en}, \${term.term_zh}, \${term.abbreviation || ''}, \${term.category || 'AI概念'}, \${term.one_liner || ''}, \${term.definition || ''}, \${term.explanation || ''}, \${term.source || ''}, \${term.source_url || ''}, \${term.appear_count || 1}, \${term.first_appeared || new Date().toISOString()}, \${term.last_appeared || new Date().toISOString()}, 'hot', \${JSON.stringify(term.related || [])}, \${term.date || ''}, \${JSON.stringify(term.sources || [])}, \${JSON.stringify(term.source_urls || [])}, \${JSON.stringify(term.matched_articles || [])})
                  ON CONFLICT (id) DO NOTHING\`;
              }
              console.log('Done!');
            })().catch(e => { console.error(e); process.exit(1); });
            "
          else
            echo "DATABASE_URL not set, skipping DB sync"
          fi


      - name: Commit & push updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hot-terms.json data/hot-7d.json data/hot-30d.json data/hot-history 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无数据变更，跳过提交"
            exit 0
          fi
          git commit -m "chore: update hot terms $(date -u +%F)"
          for i in 1 2 3; do
            git push origin HEAD:${GITHUB_REF_NAME} && exit 0
            echo "push 被拒(远程有新提交)，拉取 rebase 后重试 $i ..."
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
          done
          echo "push 最终未成功(数据已同步到数据库，不影响线上)"
